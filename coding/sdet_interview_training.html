<script>
const STORAGE_KEY = 'sdet_interview_training_progress';

const topics = [
    // === DAY 1 ===
    {
        id: 'bigo', day: 1, title: 'Big-O Notation',
        subtitle: 'Analyze time and space complexity of any algorithm',
        content: `
<div class="section">
<h3>What Is Big-O?</h3>
<p>Big-O describes how an algorithm's performance scales as input size <code>n</code> grows. It answers: "If I double the input, how much longer does this take?"</p>
<table>
<tr><th>Big-O</th><th>Name</th><th>n=1,000</th><th>Example</th></tr>
<tr><td><code>O(1)</code></td><td>Constant</td><td>1 op</td><td>Dict lookup, array index</td></tr>
<tr><td><code>O(log n)</code></td><td>Logarithmic</td><td>~10 ops</td><td>Binary search</td></tr>
<tr><td><code>O(n)</code></td><td>Linear</td><td>1,000 ops</td><td>Single loop</td></tr>
<tr><td><code>O(n log n)</code></td><td>Linearithmic</td><td>~10,000 ops</td><td>Sorting</td></tr>
<tr><td><code>O(n&sup2;)</code></td><td>Quadratic</td><td>1,000,000 ops</td><td>Nested loops</td></tr>
<tr><td><code>O(2&#x207F;)</code></td><td>Exponential</td><td>Way too many</td><td>Brute-force subsets</td></tr>
</table>
</div>

<div class="section">
<h3>Rules for Counting</h3>
<ol>
<li><strong>Drop constants:</strong> O(2n) = O(n). O(500) = O(1).</li>
<li><strong>Drop lower terms:</strong> O(n&sup2; + n) = O(n&sup2;). The biggest term wins.</li>
<li><strong>Nested loops multiply:</strong> Loop inside a loop over n = O(n &times; n) = O(n&sup2;).</li>
<li><strong>Sequential loops add:</strong> Two separate loops = O(n + n) = O(n).</li>
<li><strong>Space complexity</strong> = extra memory used (not counting the input).</li>
</ol>
</div>

<div class="section">
<h3>Worked Example</h3>
<pre><code><span class="kw">def</span> <span class="fn">find_common</span>(list_a, list_b):
    set_b = <span class="fn">set</span>(list_b)       <span class="cmt"># O(m) time and space</span>
    result = []
    <span class="kw">for</span> item <span class="kw">in</span> list_a:        <span class="cmt"># O(n) loop</span>
        <span class="kw">if</span> item <span class="kw">in</span> set_b:      <span class="cmt"># O(1) set lookup</span>
            result.append(item)
    <span class="kw">return</span> result</code></pre>
<p><strong>Time:</strong> O(n + m) &mdash; build set is O(m), loop is O(n), each lookup is O(1).</p>
<p><strong>Space:</strong> O(m) for the set.</p>
<p>Without the set, <code>item in list_b</code> would be O(m) per check, making total O(n &times; m).</p>
<div class="callout tip">The "trade space for time" pattern (build a set/dict for O(1) lookups) is the single most common optimization in coding interviews.</div>
</div>
`,
        practice: {
            problem: `What is the time and space complexity of each snippet?

<pre><code><span class="cmt"># Snippet A</span>
<span class="kw">def</span> <span class="fn">foo</span>(nums):
    <span class="kw">return</span> nums[<span class="num">0</span>] + nums[-<span class="num">1</span>]

<span class="cmt"># Snippet B</span>
<span class="kw">def</span> <span class="fn">bar</span>(nums):
    nums.sort()
    <span class="kw">return</span> nums[<span class="num">0</span>]

<span class="cmt"># Snippet C</span>
<span class="kw">def</span> <span class="fn">baz</span>(nums):
    seen = <span class="fn">set</span>()
    <span class="kw">for</span> num <span class="kw">in</span> nums:
        <span class="kw">if</span> num * <span class="num">2</span> <span class="kw">in</span> seen:
            <span class="kw">return</span> <span class="kw">True</span>
        seen.add(num)
    <span class="kw">return</span> <span class="kw">False</span></code></pre>`,
            solution: `<p><strong>Snippet A:</strong> Time O(1), Space O(1) &mdash; just two index accesses, constant work.</p>
<p><strong>Snippet B:</strong> Time O(n log n), Space O(1)* &mdash; sort dominates. (*Timsort uses O(n) space internally, but in-place sort is often treated as O(1) extra space in interviews.)</p>
<p><strong>Snippet C:</strong> Time O(n), Space O(n) &mdash; one pass through nums, set lookups are O(1), set grows to at most n elements.</p>`,
            starterCode: `# Try running the snippets and testing with different inputs

def foo(nums):
    return nums[0] + nums[-1]

def baz(nums):
    seen = set()
    for num in nums:
        if num * 2 in seen:
            return True
        seen.add(num)
    return False

print("foo([10, 20, 30]):", foo([10, 20, 30]))
print("baz([1, 2, 3, 4]):", baz([1, 2, 3, 4]))
print("baz([1, 2, 4, 8]):", baz([1, 2, 4, 8]))
`
        }
    },
    {
        id: 'arrays', day: 1, title: 'Arrays & Strings',
        subtitle: 'Two pointers, sliding window, and common array patterns',
        content: `
<div class="section">
<h3>Python List & String Essentials</h3>
<ul>
<li><code>len(arr)</code> &mdash; O(1)</li>
<li><code>arr[i]</code> &mdash; O(1) index access</li>
<li><code>arr.append(x)</code> &mdash; O(1) amortized</li>
<li><code>arr.pop()</code> &mdash; O(1) from end; <code>arr.pop(0)</code> is O(n)!</li>
<li><code>x in arr</code> &mdash; O(n) for lists; O(1) for sets</li>
<li>Strings are immutable: <code>s + "x"</code> creates a new string each time</li>
</ul>
<div class="callout warn">When an interviewer says "optimize this," the first thing to consider is: can I use a hash set or dict to replace an O(n) scan with O(1) lookup?</div>
</div>

<div class="section">
<h3>Pattern: Two Pointers</h3>
<p>Use two indices that move toward each other (or in the same direction at different speeds).</p>
<pre><code><span class="cmt"># Check if a string is a palindrome</span>
<span class="kw">def</span> <span class="fn">is_palindrome</span>(s):
    left, right = <span class="num">0</span>, <span class="fn">len</span>(s) - <span class="num">1</span>
    <span class="kw">while</span> left < right:
        <span class="kw">if</span> s[left] != s[right]:
            <span class="kw">return</span> <span class="kw">False</span>
        left += <span class="num">1</span>
        right -= <span class="num">1</span>
    <span class="kw">return</span> <span class="kw">True</span></code></pre>
<p>Time: O(n), Space: O(1). No extra data structures needed.</p>
</div>

<div class="section">
<h3>Pattern: Sliding Window</h3>
<p>Maintain a window [left, right] that expands and shrinks as you scan.</p>
<pre><code><span class="cmt"># Longest substring without repeating characters</span>
<span class="kw">def</span> <span class="fn">length_of_longest</span>(s):
    seen = <span class="fn">set</span>()
    left = max_len = <span class="num">0</span>
    <span class="kw">for</span> right <span class="kw">in</span> <span class="fn">range</span>(<span class="fn">len</span>(s)):
        <span class="kw">while</span> s[right] <span class="kw">in</span> seen:
            seen.remove(s[left])
            left += <span class="num">1</span>
        seen.add(s[right])
        max_len = <span class="fn">max</span>(max_len, right - left + <span class="num">1</span>)
    <span class="kw">return</span> max_len</code></pre>
<p>Time: O(n) &mdash; each character is added and removed at most once.</p>
</div>
`,
        practice: {
            problem: `<strong>Two Sum:</strong> Given a list of integers <code>nums</code> and a <code>target</code>, return the indices of the two numbers that add up to target. Assume exactly one solution exists.
<pre><code><span class="cmt"># Example:</span>
<span class="cmt"># nums = [2, 7, 11, 15], target = 9</span>
<span class="cmt"># Output: [0, 1]  (because 2 + 7 = 9)</span></code></pre>
<p>Think about: What's the brute force? How do you optimize with a hash map?</p>`,
            starterCode: `def two_sum(nums, target):
    # Your solution here
    pass

# Test cases
print(two_sum([2, 7, 11, 15], 9))   # Expected: [0, 1]
print(two_sum([3, 2, 4], 6))         # Expected: [1, 2]
print(two_sum([3, 3], 6))            # Expected: [0, 1]
`,
            solution: `<pre><code><span class="kw">def</span> <span class="fn">two_sum</span>(nums, target):
    seen = {}  <span class="cmt"># value -> index</span>

    <span class="kw">for</span> _ <span class="kw">in</span> <span class="fn">range</span>(<span class="num">3</span>, n+<span class="num">1</span>):
        a, b = b, a + b
    <span class="kw">return</span> b</code></pre>
<p>ways(n) = ways(n-1) + ways(n-2). Same as Fibonacci! Bottom-up DP with O(1) space.</p>`

        content: `
<div class="section">
<h3>Graph Representations</h3>
<pre><code><span class="cmt"># Adjacency list (most common in interviews)</span>
graph = {
    <span class="str">'A'</span>: [<span class="str">'B'</span>, <span class="str">'C'</span>],
    <span class="str">'B'</span>: [<span class="str">'D'</span>],
    <span class="str">'C'</span>: [<span class="str">'D'</span>],
    <span class="str">'D'</span>: []
}

<span class="cmt"># Grid as implicit graph (each cell connects to neighbors)</span>
grid = [
    [<span class="num">1</span>, <span class="num">1</span>, <span class="num">0</span>],
    [<span class="num">1</span>, <span class="num">0</span>, <span class="num">0</span>],
    [<span class="num">0</span>, <span class="num">0</span>, <span class="num">1</span>]
]</code></pre>
</div>

<div class="section">
<h3>Number of Islands (Classic Grid BFS/DFS)</h3>
<pre><code><span class="kw">def</span> <span class="fn">num_islands</span>(grid):
    <span class="kw">if not</span> grid: <span class="kw">return</span> <span class="num">0</span>
    rows, cols = <span class="fn">len</span>(grid), <span class="fn">len</span>(grid[<span class="num">0</span>])
    count = <span class="num">0</span>

    <span class="kw">def</span> <span class="fn">dfs</span>(r, c):
        <span class="kw">if</span> r < <span class="num">0</span> <span class="kw">or</span> r >= rows <span class="kw">or</span> c < <span class="num">0</span> <span class="kw">or</span> c >= cols:
            <span class="kw">return</span>
        <span class="kw">if</span> grid[r][c] != <span class="num">1</span>:
            <span class="kw">return</span>
        grid[r][c] = <span class="num">0</span>  <span class="cmt"># mark visited</span>
        dfs(r+<span class="num">1</span>, c); dfs(r-<span class="num">1</span>, c)
        dfs(r, c+<span class="num">1</span>); dfs(r, c-<span class="num">1</span>)

    <span class="kw">for</span> r <span class="kw">in</span> <span class="fn">range</span>(rows):
        <span class="kw">for</span> c <span class="kw">in</span> <span class="fn">range</span>(cols):
            <span class="kw">if</span> grid[r][c] == <span class="num">1</span>:
                count += <span class="num">1</span>
                dfs(r, c)
    <span class="kw">return</span> count</code></pre>
<div class="callout warn">Grid DFS is one of the most common interview patterns. The template: scan cells, when you find an unvisited target, DFS/BFS to mark the whole connected component, increment counter.</div>
</div>

<p>In an interview, mention both approaches. If the interviewer says "don't modify the input," use a visited set. Otherwise, in-place is cleaner.</p>
<pre><code><span class="cmt"># With visited set instead:</span>

<span class="kw">def</span> <span class="fn">dfs</span>(r, c):
    <span class="kw">if</span> (r, c) <span class="kw">in</span> visited: <span class="kw">return</span>
    visited.add((r, c))
    <span class="cmt"># ... recurse on neighbors</span></code></pre>`

<div class="section">
<h3>Equivalence Partitioning</h3>
<p>Divide inputs into classes where all values should produce the same behavior. Test one from each class.</p>
<p><strong>Example: Testing a function that accepts age (0-120):</strong></p>
<ul>
<li>Negative numbers (invalid)</li>
<li>Zero (boundary)</li>
<li>1-17 (minor)</li>
<li>18-120 (adult)</li>
<li>>120 (invalid)</li>
</ul>
</div>

<div class="section">
<h3>Boundary Value Analysis</h3>
<p>Bugs cluster at edges. For each partition boundary, test: the value just below, at, and just above.</p>
<p><strong>For age 18+ validation:</strong> test 17, 18, 19, and also 0, -1, 120, 121.</p>
</div>

<div class="section">
<h3>Edge Cases Checklist</h3>
<ul>
<li>Empty input ([], "", None, 0)</li>
<li>Single element</li>
<li>All same elements</li>
<li>Already sorted / reverse sorted</li>
<li>Very large input (performance)</li>
<li>Negative numbers, zero</li>
<li>Unicode / special characters in strings</li>
<li>Concurrent access (if applicable)</li>
</ul>
<div class="callout warn">In SDET interviews, they often ask "How would you test this function?" Don't just test the happy path. Walk through: valid inputs, invalid inputs, boundary values, edge cases, error handling.</div>
</div>

        content: `
<div class="section">
<h3>Architecture Components</h3>
<p>When asked to design a test framework, walk through these layers:</p>
<ol>
<li><strong>Test Layer:</strong> Test files organized by feature. Each test reads clearly.</li>
<li><strong>Page Objects / API Clients:</strong> Abstractions that encapsulate interactions (clicks, API calls). Tests don't know about selectors or endpoints.</li>
<li><strong>Utilities:</strong> Shared helpers (wait logic, data generators, assertions).</li>
<li><strong>Configuration:</strong> Environment URLs, credentials (from env vars/secrets), timeouts.</li>
<li><strong>Data Management:</strong> Test data setup/teardown, factories, fixtures.</li>
<li><strong>Reporting:</strong> Results, screenshots on failure, logs, CI integration.</li>
</ol>
</div>

<div class="section">
<h3>Key Design Principles</h3>
<ul>
<li><strong>Separation of concerns:</strong> Tests describe WHAT, page objects describe HOW.</li>
<li><strong>DRY but readable:</strong> Extract common patterns, but don't over-abstract. A test should be understandable without jumping to 5 other files.</li>
<li><strong>Independent tests:</strong> Each test can run alone, in any order. No shared mutable state between tests.</li>
<li><strong>Fast feedback:</strong> Tag tests by speed/type so you can run fast suites in CI and slow suites nightly.</li>
</ul>
<div class="callout warn">Talk through your answer like you're drawing on a whiteboard. Start high-level (boxes and arrows), then zoom into one area to show depth. Mention tradeoffs you've encountered.</div>
</div>
`,

        content: `
<div class="section">
<h3>The Test Pyramid</h3>
<pre><code>         /  E2E  \\        <- Few, slow, expensive, high confidence
        / Integration \\    <- Moderate count, test service interactions
       /    Unit Tests    \\ <- Many, fast, cheap, test logic in isolation</code></pre>
<ul>
<li><strong>Unit tests (~70%):</strong> Test a single function/class. Mock dependencies. Run in seconds.</li>
<li><strong>Integration tests (~20%):</strong> Test how components work together (API + DB, service A calls service B).</li>
<li><strong>E2E tests (~10%):</strong> Test full user workflows through the real UI/API. Slow but high confidence.</li>
</ul>
</div>

<div class="section">
<h3>What to Run When</h3>
<table>
<tr><th>Trigger</th><th>Tests</th><th>Why</th></tr>
<tr><td>Pre-commit</td><td>Linting, fast unit tests</td><td>Catch obvious issues locally</td></tr>
<tr><td>PR/MR</td><td>All unit + integration</td><td>Gate code quality before merge</td></tr>
<tr><td>Merge to main</td><td>Smoke suite (critical E2E)</td><td>Verify deployment readiness</td></tr>

<tr><td>Release</td><td>Full suite + performance</td><td>Final confidence check</td></tr>
</table>
<div class="callout tip">A good test strategy balances speed (fast feedback) with confidence (catching real bugs). Don't put everything in E2E &mdash; push testing as far down the pyramid as possible.</div>
</div>

            solution: `<ol>
<li><strong>Triage flaky tests:</strong> Quarantine consistently flaky tests (move to a separate nightly suite). Fix or delete them within a sprint.</li>
<li><strong>Push tests down:</strong> Identify which E2E tests are really testing logic that could be covered by unit/integration tests. Convert them.</li>
<li><strong>Parallelize:</strong> Run tests in parallel (pytest-xdist, Selenium Grid). Target: under 20 minutes.</li>
<li><strong>Improve isolation:</strong> Each test creates its own data and cleans up. No shared state = fewer timing issues.</li>
<li><strong>Add retries (carefully):</strong> Allow 1 retry for tests that failed, but track retry rate. High retry rate = still flaky.</li>
<li><strong>Fast feedback loop:</strong> Run a smoke suite (~5 min) on every PR. Full suite nightly.</li>
<li><strong>Dashboards:</strong> Track pass rate, flaky rate, and duration over time. Make the trend visible to the team.</li>
</ol>
<p><strong>Key message:</strong> Speed and reliability are more important than coverage. A fast, reliable suite that runs 50 tests is more valuable than a slow, flaky suite that runs 500.</p>`

// === STATE MANAGEMENT ===
function loadProgress() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
}

function saveProgress(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function resetProgress() {
    if (confirm('Reset all progress? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        currentTopic = null;
        render();
    }
}

let currentTopic = null;

// === RENDERING ===
function render() {
    const state = loadProgress();
    renderSidebar(state);
    renderContent(state);
    renderGlobalProgress(state);
}

function renderGlobalProgress(state) {
    const total = topics.length;
    const done = topics.filter(t => state[t.id]).length;
    const pct = Math.round((done / total) * 100);
    document.getElementById('global-pct').textContent = pct + '%';
    document.getElementById('global-bar').style.width = pct + '%';
    document.getElementById('global-count').textContent = `${done}/${total} topics`;
}

function renderSidebar(state) {
    const sidebar = document.getElementById('sidebar');
    let html = '';
    [1, 2, 3].forEach(day => {
        const dayTopics = topics.filter(t => t.day === day);
        const done = dayTopics.filter(t => state[t.id]).length;
        html += `<div class="day-group">
            <div class="day-header" onclick="toggleDay(${day})">
                <span>Day ${day}</span>
                <span class="day-progress">${done}/${dayTopics.length}</span>
            </div>
            <div class="day-topics" id="day-topics-${day}">
                ${dayTopics.map(t => `
                    <div class="topic-link ${currentTopic === t.id ? 'active' : ''}" onclick="selectTopic('${t.id}')">
                        <span class="check ${state[t.id] ? 'done' : ''}">${state[t.id] ? '&#10003;' : ''}</span>
                        <span>${t.title}</span>
                    </div>
                `).join('')}
            </div>
        </div>`;
    });
    sidebar.innerHTML = html;
}

function renderContent(state) {
    const main = document.getElementById('main-content');

    if (!currentTopic) {
        const done = topics.filter(t => state[t.id]).length;
        const nextTopic = topics.find(t => !state[t.id]);
        main.innerHTML = `
            <div class="welcome">
                <h2>SDET Interview Training</h2>
                <p>3 days of structured prep covering data structures, algorithms, Python, testing, system design, and behavioral questions.</p>
                <p style="color:var(--green)">${done}/${topics.length} topics completed</p>
                <div class="day-cards">
                    ${[1,2,3].map(day => {
                        const dt = topics.filter(t => t.day === day);
                        const dd = dt.filter(t => state[t.id]).length;
                        const titles = {1: 'DSA Foundations', 2: 'Trees + Practical', 3: 'Design + Behavioral'};
                        const descs = {1: 'Big-O, arrays, hash maps, sorting, binary search, stacks', 2: 'Trees, recursion, DP, regex, API testing, test design', 3: 'Framework design, CI/CD strategy, STAR stories, mock prep'};
                        return `<div class="day-card" onclick="selectTopic('${dt[0].id}')">
                            <h3>Day ${day}: ${titles[day]}</h3>
                            <p>${descs[day]}</p>
                            <div class="card-progress">${dd}/${dt.length} complete</div>
                        </div>`;
                    }).join('')}
                </div>
                ${nextTopic ? `<br><button class="btn-reveal" onclick="selectTopic('${nextTopic.id}')" style="margin-top:16px">${done === 0 ? 'Start Training' : 'Continue Training'}</button>` : '<br><p style="color:var(--green);font-size:1.2em;margin-top:24px">All topics complete! You\'re ready. Go crush that interview.</p>'}
            </div>`;
        return;
    }

    const topic = topics.find(t => t.id === currentTopic);
    if (!topic) return;

    const dayClass = `day${topic.day}`;
    const isComplete = state[topic.id];
    const topicIdx = topics.indexOf(topic);
    const nextT = topicIdx < topics.length - 1 ? topics[topicIdx + 1] : null;

    main.innerHTML = `
        <div class="topic-content active">
            <span class="day-badge ${dayClass}">Day ${topic.day}</span>
            <h2 class="topic-title">${topic.title}</h2>
            <p class="topic-subtitle">${topic.subtitle}</p>

            ${topic.content}

            <div class="practice-box">
                <h4>Practice Challenge</h4>
                <div class="problem">${topic.practice.problem}</div>
                ${topic.practice.starterCode ? `
                <div class="editor-widget">
                    <div class="editor-toolbar">
                        <span>python</span>
                        <button class="btn-run" id="run-btn-${topic.id}" onclick="runCode('${topic.id}')">
                            <span class="run-icon">&#9654;</span> Run
                        </button>
                    </div>
                    <textarea id="editor-${topic.id}">${topic.practice.starterCode.replace(/</g,'&lt;')}</textarea>
                    <div class="output-panel" id="output-${topic.id}"></div>
                </div>` : ''}
                <button class="btn-reveal" onclick="revealSolution('${topic.id}')">Show Solution</button>
                <div class="solution" id="solution-${topic.id}">${topic.practice.solution}</div>
            </div>

            <div class="complete-bar">
                <button class="btn-complete ${isComplete ? 'completed' : ''}" onclick="markComplete('${topic.id}')" ${isComplete ? 'disabled' : ''}>
                    ${isComplete ? 'Completed' : 'Mark Complete'}
                </button>
                ${nextT ? `<button class="btn-next-topic" onclick="selectTopic('${nextT.id}')">Next: ${nextT.title} &rarr;</button>` : '<span style="color:var(--green)">Last topic!</span>'}
            </div>
        </div>`;
    main.scrollTop = 0;

    if (topic && topic.practice.starterCode) {
        initEditor(topic.id, topic.practice.starterCode);
    }
}

// === CODE EDITOR ===
let editors = {};
let pyodideReady = null;

function initEditor(topicId, code) {
    const textarea = document.getElementById(`editor-${topicId}`);
    if (!textarea) return;
    const cm = CodeMirror.fromTextArea(textarea, {
        mode: 'python',
        theme: 'material-darker',
        lineNumbers: true,
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        lineWrapping: true,
        viewportMargin: Infinity,
        extraKeys: {
            'Tab': function(cm) {
                cm.replaceSelection('    ', 'end');
            },
            'Shift-Enter': function(cm) {
                runCode(topicId);
            }
        }
    });
    cm.setValue(code);
    editors[topicId] = cm;
}

async function loadPyodide_() {
    if (pyodideReady) return pyodideReady;
    pyodideReady = (async () => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/pyodide/v0.27.4/full/pyodide.js';
        document.head.appendChild(script);
        await new Promise((resolve, reject) => {
            script.onload = resolve;
            script.onerror = reject;
        });
        return await loadPyodide();
    })();
    return pyodideReady;
}

async function runCode(topicId) {
    const cm = editors[topicId];
    if (!cm) return;
    const code = cm.getValue();
    const outputEl = document.getElementById(`output-${topicId}`);
    const runBtn = document.getElementById(`run-btn-${topicId}`);

    outputEl.className = 'output-panel show';
    outputEl.innerHTML = '<span class="pyodide-loading">Loading Python runtime...</span>';
    runBtn.disabled = true;

    try {
        const pyodide = await loadPyodide_();

        outputEl.innerHTML = '<span class="pyodide-loading">Running...</span>';

        pyodide.runPython(`
import sys, io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
`);

        try {
            pyodide.runPython(code);
            const stdout = pyodide.runPython('sys.stdout.getvalue()');
            const stderr = pyodide.runPython('sys.stderr.getvalue()');

            if (stderr) {
                outputEl.className = 'output-panel show has-error';
                outputEl.textContent = stderr;
            } else if (stdout) {
                outputEl.className = 'output-panel show has-output';
                outputEl.textContent = stdout;
            } else {
                outputEl.className = 'output-panel show';
                outputEl.textContent = '(no output)';
            }
        } catch (err) {
            outputEl.className = 'output-panel show has-error';
            outputEl.textContent = err.message;
        }
    } catch (err) {
        outputEl.className = 'output-panel show has-error';
        outputEl.textContent = 'Failed to load Python: ' + err.message;
    }

    runBtn.disabled = false;
}

// === ACTIONS ===
function selectTopic(id) {
    currentTopic = id;
    render();
}

function toggleDay(day) {
    const el = document.getElementById(`day-topics-${day}`);
    el.classList.toggle('collapsed');
}

function revealSolution(id) {
    const el = document.getElementById(`solution-${id}`);
    el.classList.add('show');
}

function markComplete(id) {
    const state = loadProgress();
    state[id] = true;
    saveProgress(state);

    const topicIdx = topics.findIndex(t => t.id === id);
    const nextT = topicIdx < topics.length - 1 ? topics[topicIdx + 1] : null;
    if (nextT) {
        currentTopic = nextT.id;
    }
    render();
}

// === INIT ===
render();
</script>
